name: Release

# Entrega continua: al empujar un tag vX.Y.Z corre las pruebas, arma el APK release FIRMADO
# y publica un GitHub Release con el APK adjunto.
#
# El tag es la UNICA fuente de verdad de la version: el paso "Derive version" extrae
# versionName (X.Y.Z) y un versionCode entero (MAJOR*1000000 + MINOR*1000 + PATCH, monotono)
# y los inyecta al build via APP_VERSION_NAME / APP_VERSION_CODE. Asi el APK por dentro y el
# Release por fuera nunca quedan desincronizados; no hay que editar build.gradle.kts a mano.
#
# Secrets requeridos (Settings > Secrets and variables > Actions):
#   RELEASE_KEYSTORE_BASE64 - el keystore PKCS12 en base64 (base64 -w0 purpura-release.keystore)
#   RELEASE_STORE_PASSWORD  - contrasena del store
#   RELEASE_KEY_ALIAS       - alias de la llave (purpura)
#   RELEASE_KEY_PASSWORD    - contrasena de la llave (en PKCS12 == store password)
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::El tag '$TAG' no es vMAJOR.MINOR.PATCH (ej. v0.1.1)"; exit 1
          fi
          IFS=. read -r MAJOR MINOR PATCH <<EOF
          $VERSION
          EOF
          if [ "$MINOR" -gt 999 ] || [ "$PATCH" -gt 999 ]; then
            echo "::error::MINOR/PATCH > 999 desborda el esquema de versionCode"; exit 1
          fi
          CODE=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))
          echo "APP_VERSION_NAME=$VERSION" >> "$GITHUB_ENV"
          echo "APP_VERSION_CODE=$CODE" >> "$GITHUB_ENV"
          echo "Release $VERSION -> versionCode $CODE"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Tests
        run: ./gradlew :domain:test :app:testDebugUnitTest --console=plain --stacktrace

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/purpura-release.keystore"

      - name: Build signed release APK
        env:
          RELEASE_STORE_FILE: ${{ runner.temp }}/purpura-release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          # Maps Android key, inyectada al manifestPlaceholder MAPS_API_KEY (build.gradle.kts lee
          # local.properties -> env -> ""). Sin el secret el build no rompe; el mapa sale en gris.
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: ./gradlew :app:assembleRelease --console=plain --stacktrace

      - name: Verify signature
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          BUILD_TOOLS=$(ls -d "$ANDROID_SDK_ROOT"/build-tools/* | sort -V | tail -1)
          "$BUILD_TOOLS/apksigner" verify --print-certs "$APK"
          cp "$APK" "purpura-${{ github.ref_name }}.apk"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "purpura-${{ github.ref_name }}.apk" \
            --title "Purpura ${{ github.ref_name }}" \
            --generate-notes
