name: CI

# Integracion continua: corre pruebas y arma el APK debug en cada push/PR a main.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Tests + debug build
        run: ./gradlew :domain:test :app:testDebugUnitTest :app:assembleDebug --console=plain --stacktrace
